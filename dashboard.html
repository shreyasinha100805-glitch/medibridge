<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MediBridge | Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            color: white;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        input,
        select,
        button {
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 100%;
        }

        button {
            background: #185a9d;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0f3e6b;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f2f2f2;
            margin: 5px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .logout {
            background: red;
            margin-top: 10px;
        }

        .language {
            width: 200px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h2>🩺 MediBridge</h2>

    <select id="languageSelect" class="language" onchange="setLanguage()">
        <option value="en">English</option>
        <option value="bn">বাংলা</option>
        <option value="hi">हिन्दी</option>
    </select>

    <button class="logout" onclick="logout()">Logout</button>

    <p id="welcome"></p>
    <p id="role"></p>


    <!-- PATIENT PANEL -->

    <div id="patientPanel" class="card">

        <h3 id="addMedText">Add Medicine</h3>

        <input type="text" id="medName" placeholder="Medicine Name">
        <input type="time" id="medTime">

        <select id="medDays">
            <option value="1">1 Day</option>
            <option value="7">7 Days</option>
            <option value="15">15 Days</option>
            <option value="30">30 Days</option>
        </select>

        <button onclick="addMedicine()" id="addBtn">Add</button>

        <h3 id="yourMedText">Your Medicines</h3>
        <ul id="medicineList"></ul>

        <hr>

        <h3 id="reportText">📊 Daily Report</h3>
        <p id="reportSummary"></p>

    </div>


    <!-- CARETAKER PANEL -->

    <div id="caretakerPanel" class="card" style="display:none">

        <h3 id="patientsText">👨‍⚕️ My Patients</h3>
        <ul id="patientsList"></ul>

        <h3 id="patientMedText">💊 Patient Medicines</h3>
        <ul id="patientMedicines"></ul>

        <hr>

        <h3>📊 Caretaker Daily Report</h3>
        <p id="caretakerReport"></p>

    </div>


    <!-- HOSPITAL -->

    <div class="card">

        <h3 id="hospitalText">Nearest Hospitals</h3>

        <button onclick="getLocation()" id="hospitalBtn">Find Nearest Hospital</button>

        <ul id="hospitalList"></ul>

    </div>


    <script>

        let medicines = [];

        /* ================= TRANSLATIONS ================= */

        const translations = {

            en: {
                welcome: "Welcome",
                role: "Role",
                addMed: "Add Medicine",
                yourMed: "Your Medicines",
                report: "Daily Report",
                taken: "Taken Today",
                pending: "Pending",
                patients: "My Patients",
                patientMed: "Patient Medicines",
                hospital: "Nearest Hospitals",
                findHospital: "Find Nearest Hospital",
                logout: "Logout",
                add: "Add"
            },

            bn: {
                welcome: "স্বাগতম",
                role: "ভূমিকা",
                addMed: "ওষুধ যোগ করুন",
                yourMed: "আপনার ওষুধ",
                report: "দৈনিক রিপোর্ট",
                taken: "আজ নেওয়া হয়েছে",
                pending: "বাকি আছে",
                patients: "আমার রোগীরা",
                patientMed: "রোগীর ওষুধ",
                hospital: "নিকটস্থ হাসপাতাল",
                findHospital: "নিকটস্থ হাসপাতাল খুঁজুন",
                logout: "লগআউট",
                add: "যোগ করুন"
            },

            hi: {
                welcome: "स्वागत",
                role: "भूमिका",
                addMed: "दवा जोड़ें",
                yourMed: "आपकी दवाइयाँ",
                report: "दैनिक रिपोर्ट",
                taken: "आज ली गई",
                pending: "बाकी",
                patients: "मेरे मरीज",
                patientMed: "मरीज की दवाइयाँ",
                hospital: "नजदीकी अस्पताल",
                findHospital: "नजदीकी अस्पताल खोजें",
                logout: "लॉगआउट",
                add: "जोड़ें"
            }

        };

        /* ================= LANGUAGE SWITCH ================= */

        function setLanguage() {

            let lang = document.getElementById("languageSelect").value;

            document.getElementById("addMedText").innerText = translations[lang].addMed;
            document.getElementById("yourMedText").innerText = translations[lang].yourMed;
            document.getElementById("reportText").innerText = translations[lang].report;
            document.getElementById("patientsText").innerText = translations[lang].patients;
            document.getElementById("patientMedText").innerText = translations[lang].patientMed;
            document.getElementById("hospitalText").innerText = translations[lang].hospital;

            document.querySelector(".logout").innerText = translations[lang].logout;
            document.getElementById("addBtn").innerText = translations[lang].add;
            document.getElementById("hospitalBtn").innerText = translations[lang].findHospital;

            localStorage.setItem("lang", lang);

        }

        /* ================= LOAD LANGUAGE ================= */

        window.onload = () => {

            let savedLang = localStorage.getItem("lang") || "en";
            document.getElementById("languageSelect").value = savedLang;
            setLanguage();

        };


        /* ================= LOGIN CHECK ================= */

        const token = localStorage.getItem("token");
        const userId = localStorage.getItem("userId");
        const role = localStorage.getItem("role");
        const username = localStorage.getItem("username");

        if (!token) {
            alert("Please login first");
            window.location.href = "login.html";
        }

        document.getElementById("welcome").innerText = "Welcome: " + username;
        document.getElementById("role").innerText = "Role: " + role;


        /* ================= ROLE DASHBOARD ================= */

        if (role === "Caretaker") {

            document.getElementById("patientPanel").style.display = "none";
            document.getElementById("caretakerPanel").style.display = "block";

            loadPatients();
            loadCaretakerReport();

        } else {

            loadMedicines();
            loadReport();

        }


        /* ================= ADD MEDICINE ================= */

        async function addMedicine() {

            const name = document.getElementById("medName").value;
            const time = document.getElementById("medTime").value;

            const res = await fetch("http://localhost:3000/medicines", {

                method: "POST",
                headers: { "Content-Type": "application/json" },

                body: JSON.stringify({
                    user_id: userId,
                    name,
                    time,
                    category: "Tablet"
                })

            });

            const data = await res.json();

            alert(data.message);

            loadMedicines();
            loadReport();

        }


        /* ================= LOAD MEDICINES ================= */

        async function loadMedicines() {

            const res = await fetch(`http://localhost:3000/medicines/${userId}`);

            medicines = await res.json();

            const container = document.getElementById("medicineList");

            container.innerHTML = "";

            medicines.forEach(m => {

                container.innerHTML += `

<li>

💊 ${m.name} - ${m.time}

${m.taken
                        ? `<span style="color:green;font-weight:bold;">✅ Taken</span>`
                        : `<button onclick="markTaken(${m.id})">Mark Taken</button>`}

</li>

`;

            });

        }


        /* ================= MARK TAKEN ================= */

        async function markTaken(id) {

            const res = await fetch(`http://localhost:3000/medicines/${id}/taken`, {
                method: "PUT"
            });

            const data = await res.json();

            alert(data.message);

            loadMedicines();
            loadReport();

        }


        /* ================= DAILY REPORT ================= */

        async function loadReport() {

            const res = await fetch(`http://localhost:3000/medicines/${userId}`);
            const meds = await res.json();

            let taken = meds.filter(m => m.taken).length;
            let pending = meds.filter(m => !m.taken).length;

            let lang = localStorage.getItem("lang") || "en";

            document.getElementById("reportSummary").innerHTML = `

<p>✅ ${translations[lang].taken}: ${taken}</p>
<p>⏳ ${translations[lang].pending}: ${pending}</p>

`;

        }


        /* ================= CARETAKER PATIENTS ================= */

        async function loadPatients() {

            const caretakerId = localStorage.getItem("userId");

            const res = await fetch(`http://localhost:3000/caretaker/patients/${caretakerId}`);
            const patients = await res.json();

            const container = document.getElementById("patientsList");
            container.innerHTML = "";

            if (patients.length === 0) {
                container.innerHTML = "<li>No patients assigned</li>";
                return;
            }

            patients.forEach(p => {

                container.innerHTML += `
        <li>
        👤 ${p.username}

        <button onclick="viewMedicines(${p.id})">
        View Medicines
        </button>

        </li>
        `;
            });

        }

        /* ================= VIEW PATIENT MEDICINES ================= */

        async function viewMedicines(patientId) {

            const res = await fetch(`http://localhost:3000/caretaker/medicines/${patientId}`);

            const meds = await res.json();

            const container = document.getElementById("patientMedicines");

            container.innerHTML = "";

            meds.forEach(m => {

                container.innerHTML += `

<li>

💊 ${m.name} - ${m.time}

${m.taken
                        ? `<span style="color:green;font-weight:bold;">✅ Taken</span>`
                        : `<span style="color:red;font-weight:bold;">❌ Not Taken</span>`}

</li>

`;

            });

        }


        /* ================= CARETAKER REPORT ================= */

        async function loadCaretakerReport() {

            const res = await fetch("http://localhost:3000/caretaker/taken");

            const meds = await res.json();

            let taken = meds.filter(m => m.taken).length;
            let pending = meds.filter(m => !m.taken).length;

            document.getElementById("caretakerReport").innerHTML = `

<p>✅ Medicines Taken Today: ${taken}</p>
<p>⏳ Pending Medicines: ${pending}</p>

`;

        }


        /* ================= AUTO REFRESH ================= */

        setInterval(() => {

            if (role === "Patient") {
                loadMedicines();
                loadReport();
            }

            if (role === "Caretaker") {
                loadCaretakerReport();
            }

        }, 30000);


        /* ================= HOSPITAL ================= */

        function getLocation() {

            if (navigator.geolocation) {

                navigator.geolocation.getCurrentPosition(pos => {

                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;

                    hospitalList.innerHTML = `

<li>

<a target="_blank"
href="https://www.google.com/maps/search/hospital/@${lat},${lon},15z">

View Nearest Hospitals

</a>

</li>

`;

                });

            }

        }


        /* ================= LOGOUT ================= */

        function logout() {

            localStorage.clear();
            window.location.href = "login.html";

        }

    </script>

</body>

</html>
