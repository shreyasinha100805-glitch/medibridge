<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MediBridge | Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #43cea2, #185a9d);
        }

        .container {
            background: #fff;
            padding: 35px;
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            background: #43cea2;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2bb673;
        }

        .message {
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .link {
            margin-top: 10px;
            display: block;
            color: #185a9d;
            cursor: pointer;
            text-decoration: underline;
        }

        .strength {
            font-size: 12px;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 id="title">🩺 Create MediBridge Account</h2>

        <!-- Language -->
        <select onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="bn">বাংলা</option>
            <option value="hi">हिन्दी</option>
        </select>

        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password" onkeyup="checkStrength()">
        <div id="strength" class="strength"></div>

        <input type="password" id="confirm" placeholder="Confirm Password">

        <select id="role">
            <option value="">Select Role</option>
            <option value="Patient">Patient</option>
            <option value="Caretaker">Caretaker</option>
        </select>

        <button onclick="createAccount()" id="createBtn">Create Account</button>

        <p id="message" class="message"></p>

        <span class="link" onclick="goToLogin()" id="loginLink">Already have account? Login</span>

    </div>

    <script>

        let currentLang = "en";

        const translations = {
            en: {
                title: "🩺 Create MediBridge Account",
                create: "Create Account",
                login: "Already have account? Login"
            },
            bn: {
                title: "🩺 মেডিব্রিজ একাউন্ট তৈরি করুন",
                create: "একাউন্ট তৈরি করুন",
                login: "আগে থেকেই একাউন্ট আছে? লগইন করুন"
            },
            hi: {
                title: "🩺 मेडिब्रिज अकाउंट बनाएं",
                create: "अकाउंट बनाएं",
                login: "पहले से अकाउंट है? लॉगिन करें"
            }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById("title").innerText = translations[lang].title;
            document.getElementById("createBtn").innerText = translations[lang].create;
            document.getElementById("loginLink").innerText = translations[lang].login;
        }

        function checkStrength() {
            let password = document.getElementById("password").value;
            let strength = document.getElementById("strength");

            if (password.length < 6) {
                strength.innerHTML = "Weak Password";
                strength.style.color = "red";
            } else if (password.match(/[A-Z]/) && password.match(/[0-9]/)) {
                strength.innerHTML = "Strong Password";
                strength.style.color = "green";
            } else {
                strength.innerHTML = "Medium Password";
                strength.style.color = "orange";
            }
        }

        async function createAccount() {

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirm = document.getElementById("confirm").value.trim();
            const role = document.getElementById("role").value;
            const message = document.getElementById("message");

            message.className = "message";
            message.innerText = "";

            // Validation
            if (!username || !email || !password || !confirm || !role) {
                message.innerText = "Please fill all fields.";
                message.classList.add("error");
                return;
            }

            if (password !== confirm) {
                message.innerText = "Passwords do not match.";
                message.classList.add("error");
                return;
            }

        try {
            const response = await fetch("http://localhost:3000/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username,
                    email,
                    password,
                    role   // "patient" or "caretaker"
                })
            });

            const data = await response.json();

            if (!response.ok) {
                message.innerText = data.message || "Signup failed.";
                message.classList.add("error");
                return;
            }

            message.innerText = "Account Created Successfully! Redirecting to login...";
            message.classList.add("success");

            // Clear form
            document.getElementById("username").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
            document.getElementById("confirm").value = "";
            document.getElementById("role").value = "";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);

        } catch (error) {
            message.innerText = "Cannot connect to server. Make sure backend is running.";
            message.classList.add("error");
        }
        }

        function goToLogin() {
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
