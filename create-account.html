<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MediBridge | Create Account</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #43cea2, #185a9d);
        }

        .container {
            background: #fff;
            padding: 35px;
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            background: #43cea2;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #2bb673;
        }

        .message {
            font-weight: bold;
            margin-top: 10px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .link {
            margin-top: 10px;
            display: block;
            color: #185a9d;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 id="title">🩺 Create MediBridge Account</h2>

        <select onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="bn">বাংলা</option>
            <option value="hi">हिन्दी</option>
        </select>

        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirm" placeholder="Confirm Password">

        <select id="role">
            <option value="">Select Role</option>
            <option value="Patient">Patient</option>
            <option value="Caretaker">Caretaker</option>
        </select>

        <button onclick="createAccount()" id="createBtn">Create Account</button>

        <p id="message" class="message"></p>

        <span class="link" onclick="goToLogin()" id="loginLink">
            Already have account? Login
        </span>

    </div>

    <script>

        const translations = {
            en: {
                title: "🩺 Create MediBridge Account",
                create: "Create Account",
                login: "Already have account? Login"
            },
            bn: {
                title: "🩺 মেডিব্রিজ একাউন্ট তৈরি করুন",
                create: "একাউন্ট তৈরি করুন",
                login: "আগে থেকেই একাউন্ট আছে? লগইন করুন"
            },
            hi: {
                title: "🩺 मेडिब्रिज अकाउंट बनाएं",
                create: "अकाउंट बनाएं",
                login: "पहले से अकाउंट है? लॉगिन करें"
            }
        };

        function changeLanguage(lang) {

            document.getElementById("title").innerText = translations[lang].title;
            document.getElementById("createBtn").innerText = translations[lang].create;
            document.getElementById("loginLink").innerText = translations[lang].login;

        }

        async function createAccount() {

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirm = document.getElementById("confirm").value.trim();
            const role = document.getElementById("role").value;
            const message = document.getElementById("message");

            message.innerText = "";
            message.className = "message";

            if (!username || !email || !password || !confirm || !role) {
                message.innerText = "Please fill all fields";
                message.classList.add("error");
                return;
            }

            if (password !== confirm) {
                message.innerText = "Passwords do not match";
                message.classList.add("error");
                return;
            }

            try {

                const res = await fetch(
                    "https://medibridge-backend-nq9w.onrender.com/signup",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        mode: "cors",
                        body: JSON.stringify({
                            username,
                            email,
                            password,
                            role
                        })
                    });

                const data = await res.json();

                if (data.message !== "User created") {
                    message.innerText = data.message;
                    message.classList.add("error");
                    return;
                }

                message.innerText = "Account created successfully!";
                message.classList.add("success");

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);

            }
            catch (err) {

                message.innerText = "Cannot connect to server";
                message.classList.add("error");

            }

        }

        function goToLogin() {

            window.location.href = "login.html";

        }

    </script>

</body>

</html>
